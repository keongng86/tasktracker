<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Follow-ups</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0D0F12" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #0D0F12; color: #E2E4EC; font-family: -apple-system, 'Inter', system-ui, sans-serif; min-height: 100vh; }

    /* ── App shell ── */
    #app { max-width: 480px; margin: 0 auto; position: relative; min-height: 100vh; }

    /* ── Header ── */
    #header { padding: 20px 16px 12px; border-bottom: 1px solid #1C1F2A; position: sticky; top: 0; background: #0D0F12; z-index: 10; }
    #header-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 14px; }
    #date-label { font-size: 11px; color: #555B70; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
    #page-title { font-size: 20px; font-weight: 600; letter-spacing: -0.03em; line-height: 1; }
    .hdr-actions { display: flex; gap: 6px; align-items: center; }
    .hdr-btn { background: none; border: 1px solid #1C1F2A; color: #555B70; border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; font-family: inherit; white-space: nowrap; }
    .hdr-btn.active { border-color: #2D5BE3; color: #7BA4F4; }
    #input-row { display: flex; gap: 8px; }
    #capture-input { flex: 1; background: #161920; border: 1px solid #252830; border-radius: 8px; padding: 11px 14px; color: #E2E4EC; font-size: 15px; outline: none; font-family: inherit; }
    #capture-input::placeholder { color: #383C4E; }
    #add-btn { background: #2D5BE3; border: none; border-radius: 8px; width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    #status { font-size: 12px; color: #555B70; text-align: center; padding: 8px 0 0; min-height: 20px; }

    /* ── Capture extras (dropdowns) ── */
    #capture-extras { display: flex; gap: 6px; margin-top: 7px; }
    .capture-select { flex: 1; background: #161920; border: 1px solid #252830; border-radius: 7px; padding: 7px 10px; color: #555B70; font-size: 12px; font-family: inherit; outline: none; cursor: pointer; appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23555B70' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 10px center; padding-right: 28px; }
    .capture-select:focus { border-color: #2D5BE3; }
    .capture-select.preset { color: #E2E4EC; border-color: #2D5BE3; }
    .capture-select option { background: #161920; color: #E2E4EC; }

    /* ── Triage instructions ── */
    #triage-instructions { width: 100%; background: #161920; border: 1px solid #252830; border-radius: 8px; padding: 9px 13px; color: #E2E4EC; font-size: 13px; font-family: inherit; outline: none; resize: none; margin-bottom: 8px; }
    #triage-instructions::placeholder { color: #383C4E; }
    #triage-instructions:focus { border-color: #2D5BE3; }

    /* ── Sort bar ── */
    #sort-bar { display: none; padding: 10px 16px 2px; gap: 6px; flex-wrap: wrap; }
    #sort-bar.visible { display: flex; }
    .sort-btn { background: #161920; border: 1px solid #252830; border-radius: 6px; padding: 5px 11px; color: #555B70; font-size: 12px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .sort-btn.active { background: #2D5BE3; border-color: #2D5BE3; color: white; }

    /* ── Workstream groups ── */
    .ws-group { margin-top: 4px; }
    .ws-header { font-size: 10px; color: #555B70; text-transform: uppercase; letter-spacing: 0.1em; padding: 14px 0 5px; }

    /* ── List ── */
    #list { padding: 4px 16px 120px; }
    .empty-state { text-align: center; color: #2E3245; font-size: 14px; padding: 56px 0; }
    .item { display: flex; align-items: flex-start; gap: 10px; padding: 11px 0 11px 10px; border-bottom: 1px solid #161920; border-left: 2px solid transparent; transition: opacity 0.15s; }
    .item.done { opacity: 0.35; }
    .item.p-high   { border-left-color: #EF6B6B; }
    .item.p-medium { border-left-color: #EFA35B; }
    .item.p-low    { border-left-color: #5BC4EF; }
    .check-btn { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid #2E3245; background: transparent; cursor: pointer; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .check-btn.checked { background: #2D5BE3; border-color: #2D5BE3; }
    .item-body { flex: 1; min-width: 0; }
    .item-text { font-size: 14px; line-height: 1.45; }
    .item.done .item-text { text-decoration: line-through; }
    .item-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
    .item-time { font-size: 11px; color: #555B70; }
    .item-priority-label { font-size: 11px; }
    .item-deadline-tag { font-size: 11px; color: #EFA35B; }
    .item-deadline-tag.overdue { color: #EF6B6B; }
    .item-est-tag { font-size: 11px; color: #3E4358; }
    .meta-sep { font-size: 11px; color: #2E3245; }
    .del-btn { background: none; border: none; color: #2E3245; cursor: pointer; font-size: 20px; line-height: 1; padding: 0 2px; flex-shrink: 0; }
    .edit-btn { background: none; border: none; color: #2E3245; cursor: pointer; padding: 0 3px; flex-shrink: 0; display: flex; align-items: center; opacity: 0; transition: opacity 0.15s; }
    .item:hover .edit-btn { opacity: 1; }
    .item-edit-input { width: 100%; background: #1C1F2A; border: 1px solid #2D5BE3; border-radius: 6px; padding: 6px 10px; color: #E2E4EC; font-size: 14px; font-family: inherit; outline: none; line-height: 1.45; }
    .edit-action-btn { background: none; border: none; cursor: pointer; padding: 0 3px; flex-shrink: 0; font-size: 16px; line-height: 1; }
    .edit-save-btn { color: #2D5BE3; }
    .edit-cancel-btn { color: #2E3245; font-size: 20px; }

    /* ── Triage CTA (mobile: fixed footer) ── */
    #triage-footer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; padding: 12px 16px 28px; background: linear-gradient(to top, #0D0F12 70%, transparent); display: none; z-index: 9; }
    #triage-btn { width: 100%; background: #2D5BE3; border: none; border-radius: 10px; padding: 14px; color: white; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; letter-spacing: -0.01em; transition: background 0.2s, opacity 0.2s; }
    #triage-btn:disabled { background: #161920; color: #555B70; cursor: not-allowed; }

    /* ── Triage results ── */
    #triage-result { padding: 0 16px 16px; display: none; }
    .result-summary { background: #161920; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
    .result-label { font-size: 10px; color: #555B70; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 7px; }
    .result-summary-text { font-size: 14px; line-height: 1.55; color: #B8BACC; }
    .deep-work-card { background: #161920; border: 1px solid #252830; border-radius: 10px; padding: 13px 15px; margin-bottom: 10px; display: flex; gap: 10px; align-items: flex-start; }
    .deep-work-icon { font-size: 17px; flex-shrink: 0; margin-top: 1px; }
    .deep-work-text { font-size: 13px; color: #B8BACC; line-height: 1.5; }
    .deep-work-text strong { color: #E2E4EC; }
    .result-ws-header { font-size: 10px; color: #555B70; text-transform: uppercase; letter-spacing: 0.1em; padding-bottom: 7px; margin-bottom: 8px; border-bottom: 1px solid #1C1F2A; }
    .result-ws-group { margin-bottom: 18px; }
    .result-item { background: #161920; border-radius: 10px; padding: 13px 15px; margin-bottom: 8px; }
    .result-item-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
    .result-item-text { font-size: 13px; color: #E2E4EC; flex: 1; line-height: 1.4; }
    .priority-badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; font-weight: 600; letter-spacing: 0.05em; }
    .result-next { font-size: 13px; color: #6B7080; line-height: 1.4; }
    .result-meta-row { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
    .result-deadline { font-size: 11px; color: #EFA35B; }
    .result-est-time { font-size: 11px; color: #3E4358; }
    .result-flag { font-size: 12px; color: #EFA35B; margin-top: 6px; }
    .error-msg { color: #EF6B6B; font-size: 14px; padding: 8px 0; }

    /* ── Time picker bottom sheet ── */
    .tp-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
    .tp-sheet { background: #161920; border-radius: 16px 16px 0 0; padding: 20px 16px 36px; width: 100%; max-width: 480px; }
    .tp-title { font-size: 13px; color: #555B70; text-align: center; margin-bottom: 14px; }
    .tp-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .tp-opt { background: #1C1F2A; border: none; border-radius: 8px; padding: 13px; color: #E2E4EC; font-size: 14px; cursor: pointer; font-family: inherit; text-align: center; transition: background 0.1s; }
    .tp-opt:active, .tp-opt:hover { background: #252830; }
    .tp-opt.tp-skip { grid-column: span 2; color: #555B70; font-size: 13px; padding: 10px; }

    /* ── Desktop responsive layout ── */
    @media (min-width: 768px) {
      body { background: #090B0E; }

      #app {
        max-width: 1160px;
        margin: 0 auto;
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
        grid-template-columns: 1fr;
      }

      #header {
        position: sticky;
        top: 0;
        z-index: 10;
        padding: 24px 32px 14px;
        border-bottom: 1px solid #1C1F2A;
        background: #090B0E;
      }

      #header-top { margin-bottom: 16px; }
      #date-label { font-size: 12px; }
      #page-title { font-size: 24px; }
      #capture-input { font-size: 15px; padding: 12px 16px; }

      /* Two-column main area */
      #main {
        display: grid;
        grid-template-columns: 420px 1fr;
        align-items: start;
        gap: 0;
        min-height: 0;
      }

      #left-panel {
        border-right: 1px solid #1C1F2A;
        min-height: calc(100vh - 100px);
        position: relative;
        display: flex;
        flex-direction: column;
      }

      #right-panel {
        padding: 20px 32px 40px;
        min-height: calc(100vh - 100px);
        overflow-y: auto;
      }

      #sort-bar { padding: 12px 24px 4px; }

      #list { padding: 4px 24px 100px; }

      /* Triage button: in-flow at bottom of left panel on desktop */
      #triage-footer {
        position: sticky;
        bottom: 0;
        left: 0;
        transform: none;
        width: 100%;
        max-width: 100%;
        padding: 12px 24px 20px;
        background: linear-gradient(to top, #090B0E 65%, transparent);
      }

      /* Triage result: right panel only */
      #triage-result {
        padding: 0;
        display: block !important; /* always reserve space on desktop */
      }

      .tp-sheet { max-width: 420px; border-radius: 16px; margin-bottom: 40px; }
    }

    @media (min-width: 1100px) {
      #main { grid-template-columns: 480px 1fr; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-top">
      <div>
        <div id="date-label"></div>
        <div id="page-title">Follow-ups</div>
      </div>
      <div class="hdr-actions">
        <button id="toggle-done-btn" class="hdr-btn" onclick="toggleHideDone()" style="display:none">Hide done</button>
        <button id="clear-btn" class="hdr-btn" onclick="clearAll()" style="display:none">Clear all</button>
      </div>
    </div>
    <div id="input-row">
      <input id="capture-input" type="text" placeholder="Note — include workstream, deadline, time hint…" autocomplete="off" autocorrect="off" />
      <button id="add-btn" onclick="addItem()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div id="capture-extras">
      <select id="preset-priority" class="capture-select" onchange="this.classList.toggle('preset', this.value !== '')">
        <option value="">Priority</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
      <select id="preset-time" class="capture-select" onchange="this.classList.toggle('preset', this.value !== '')">
        <option value="">Est. time</option>
        <option value="<15 min">&lt;15 min</option>
        <option value="30 min">30 min</option>
        <option value="1 hr">1 hr</option>
        <option value="2 hr">2 hr</option>
        <option value="half day">Half day</option>
        <option value="full day">Full day</option>
      </select>
    </div>
    <div id="status"></div>
  </div>

  <div id="main">
    <div id="left-panel">
      <div id="sort-bar">
        <button class="sort-btn" data-sort="deadline" onclick="setSort('deadline')">By deadline</button>
        <button class="sort-btn" data-sort="priority" onclick="setSort('priority')">By importance</button>
        <button class="sort-btn" data-sort="time" onclick="setSort('time')">Quick wins first</button>
      </div>
      <div id="list"></div>
      <div id="triage-footer">
        <textarea id="triage-instructions" rows="2" placeholder="Special instructions for this triage (optional)…"></textarea>
        <button id="triage-btn" onclick="triage()">Triage</button>
      </div>
    </div>

    <div id="right-panel">
      <div id="triage-result"></div>
    </div>
  </div>
</div>

<script>
  // ── Config ─────────────────────────────────────────────────────────────────
  // Supabase columns required:
  // ALTER TABLE captures ADD COLUMN IF NOT EXISTS workstream text;
  // ALTER TABLE captures ADD COLUMN IF NOT EXISTS priority text;
  // ALTER TABLE captures ADD COLUMN IF NOT EXISTS deadline text;
  // ALTER TABLE captures ADD COLUMN IF NOT EXISTS estimated_time text;
  // ALTER TABLE captures ADD COLUMN IF NOT EXISTS actual_time text;

  const SUPABASE_URL = "https://vaadgbsygucdcbqwhmqd.supabase.co";
  const SUPABASE_KEY = "sb_publishable_4TRqb2c8JdRJziNV81dosw_9fZ3H6Tg";
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const P_COLOR = { High: "#EF6B6B", Medium: "#EFA35B", Low: "#5BC4EF" };
  const TIME_MINS = { "<15 min": 15, "30 min": 30, "1 hr": 60, "2 hr": 120, "2 hr+": 120, "half day": 240, "full day": 480 };

  let items = [];
  let currentSort = null;
  let hideDone = false;
  let triageRun = false;
  let editingId = null;

  // ── Init ───────────────────────────────────────────────────────────────────
  document.getElementById("date-label").textContent = new Date().toLocaleDateString("en-SG", { weekday: "long", day: "numeric", month: "short" });
  document.getElementById("capture-input").addEventListener("keydown", e => { if (e.key === "Enter") addItem(); });

  async function init() {
    setStatus("Loading…");
    const { data, error } = await db.from("captures").select("*").order("created_at", { ascending: false });
    if (error) { setStatus("Could not load — check connection"); return; }
    items = data || [];
    triageRun = items.some(i => i.workstream || i.priority);
    if (triageRun) document.getElementById("sort-bar").classList.add("visible");
    render();
    setStatus("");
  }

  // ── CRUD ───────────────────────────────────────────────────────────────────
  async function addItem() {
    const input = document.getElementById("capture-input");
    const text = input.value.trim();
    if (!text) return;
    input.value = "";

    const prioritySel = document.getElementById("preset-priority");
    const timeSel = document.getElementById("preset-time");
    const presetPriority = prioritySel.value || null;
    const presetTime = timeSel.value || null;
    prioritySel.value = ""; prioritySel.classList.remove("preset");
    timeSel.value = ""; timeSel.classList.remove("preset");

    const timestamp = new Date().toLocaleTimeString("en-SG", { hour: "2-digit", minute: "2-digit" });
    setStatus("Saving…");
    const { data, error } = await db.from("captures").insert({
      text, timestamp, done: false,
      priority: presetPriority,
      estimated_time: presetTime
    }).select().single();
    if (error) { setStatus("Save failed"); return; }
    items.unshift(data);
    render();
    setStatus("");
    document.getElementById("capture-input").focus();
  }

  async function toggleDone(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    if (item.done) {
      const { error } = await db.from("captures").update({ done: false, actual_time: null }).eq("id", id);
      if (!error) { item.done = false; item.actual_time = null; render(); }
    } else {
      showTimePicker(id);
    }
  }

  async function completeDone(id, actualTime) {
    removePicker();
    const item = items.find(i => i.id === id);
    if (!item) return;
    const update = { done: true };
    if (actualTime) update.actual_time = actualTime;
    const { error } = await db.from("captures").update(update).eq("id", id);
    if (!error) { item.done = true; if (actualTime) item.actual_time = actualTime; render(); }
  }

  async function deleteItem(id) {
    const { error } = await db.from("captures").delete().eq("id", id);
    if (!error) { items = items.filter(i => i.id !== id); render(); }
  }

  async function clearAll() {
    if (!confirm("Clear all follow-ups?")) return;
    const { error } = await db.from("captures").delete().neq("id", 0);
    if (!error) {
      items = []; triageRun = false; currentSort = null; hideDone = false;
      document.getElementById("sort-bar").classList.remove("visible");
      updateTriageResultVisibility();
      render();
    }
  }

  // ── Purge / hide done ──────────────────────────────────────────────────────
  function toggleHideDone() {
    hideDone = !hideDone;
    const btn = document.getElementById("toggle-done-btn");
    btn.textContent = hideDone ? "Show done" : "Hide done";
    btn.classList.toggle("active", hideDone);
    render();
  }

  // ── Time picker ────────────────────────────────────────────────────────────
  function showTimePicker(id) {
    removePicker();
    const overlay = document.createElement("div");
    overlay.className = "tp-overlay";
    overlay.id = "tp-overlay";
    overlay.innerHTML = `
      <div class="tp-sheet">
        <div class="tp-title">How long did this take?</div>
        <div class="tp-options">
          <button class="tp-opt" onclick="completeDone(${id}, '<15 min')">&lt; 15 min</button>
          <button class="tp-opt" onclick="completeDone(${id}, '30 min')">30 min</button>
          <button class="tp-opt" onclick="completeDone(${id}, '1 hr')">1 hr</button>
          <button class="tp-opt" onclick="completeDone(${id}, '2 hr+')">2 hr+</button>
          <button class="tp-opt tp-skip" onclick="completeDone(${id}, null)">Skip</button>
        </div>
      </div>`;
    overlay.addEventListener("click", e => { if (e.target === overlay) removePicker(); });
    document.body.appendChild(overlay);
  }

  function removePicker() {
    const el = document.getElementById("tp-overlay");
    if (el) el.remove();
  }

  // ── Inline edit ────────────────────────────────────────────────────────────
  function startEdit(id) {
    editingId = id;
    render();
    setTimeout(() => {
      const input = document.getElementById(`edit-input-${id}`);
      if (input) { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
    }, 0);
  }

  function cancelEdit() {
    editingId = null;
    render();
  }

  async function saveEdit(id) {
    const input = document.getElementById(`edit-input-${id}`);
    if (!input) return;
    const newText = input.value.trim();
    if (!newText) { cancelEdit(); return; }
    const item = items.find(i => i.id === id);
    if (!item) { cancelEdit(); return; }
    if (newText === item.text) { cancelEdit(); return; }
    setStatus("Saving…");
    const { error } = await db.from("captures").update({
      text: newText, workstream: null, priority: null, deadline: null, estimated_time: null
    }).eq("id", id);
    if (!error) {
      item.text = newText;
      item.workstream = null; item.priority = null; item.deadline = null; item.estimated_time = null;
    }
    setStatus("");
    editingId = null;
    render();
  }

  // ── API Key ────────────────────────────────────────────────────────────────
  function getApiKey() { return localStorage.getItem("anthropic_api_key") || ""; }
  function promptForApiKey() {
    const key = prompt("Enter your Anthropic API key (stored locally on this device only):", getApiKey());
    if (key && key.trim()) { localStorage.setItem("anthropic_api_key", key.trim()); return key.trim(); }
    return null;
  }

  // ── Triage ─────────────────────────────────────────────────────────────────
  async function triage() {
    const active = items.filter(i => !i.done);
    if (!active.length) return;

    let apiKey = getApiKey();
    if (!apiKey) { apiKey = promptForApiKey(); if (!apiKey) return; }

    const btn = document.getElementById("triage-btn");
    btn.disabled = true;
    btn.textContent = "Triaging…";

    const calibration = items.filter(i => i.done && i.estimated_time && i.actual_time).slice(0, 10);
    const calibrationBlock = calibration.length
      ? `Past time estimates vs actuals (use to calibrate your estimates):\n` +
        calibration.map(i => `- "${escTxt(i.text)}" → estimated: ${i.estimated_time}, actual: ${i.actual_time}`).join("\n")
      : "";

    const instructions = (document.getElementById("triage-instructions").value || "").trim();

    const todayISO = new Date().toISOString().split("T")[0];

    const itemLines = active.map(i => {
      const hints = [];
      if (i.priority) hints.push(`priority:${i.priority}`);
      if (i.estimated_time) hints.push(`time:${i.estimated_time}`);
      const hintStr = hints.length ? ` [preset: ${hints.join(", ")}]` : "";
      return `[id:${i.id}] [${i.timestamp}]${hintStr} ${i.text}`;
    }).join("\n");

    const prompt = `You are a practical meeting notes organiser. Today is ${todayISO} (Singapore time).

${calibrationBlock}
${instructions ? `Special instructions for this triage:\n${instructions}\n` : ""}
Triage these open follow-up items:
${itemLines}

For each item return:
- id: numeric id as given
- workstream: infer from explicit context clues (project name, team, topic). 2–4 words. Use "General" only if there are genuinely no clues.
- priority: "High", "Medium", or "Low". Distinguish urgency from importance — a tight deadline alone does not make something High priority if the task itself is not important. If an item has a preset priority, respect it unless the special instructions say otherwise.
- deadline: if mentioned, return as ISO date string (YYYY-MM-DD) relative to today (${todayISO}). null if none mentioned.
- estimated_time: one of "<15 min", "30 min", "1 hr", "2 hr", "half day", "full day". If an item has a preset time, use it. Otherwise use any time hint in the note, calibration data if available, or estimate from task complexity.
- next_step: one concrete action that follows directly from the note. Don't add steps not implied.
- flag: short warning only if there is an explicit blocker or hard deadline. Otherwise null.

Write a 1–2 sentence factual summary of what is open. Do not editorialize.

Respond ONLY with valid JSON, no markdown, no preamble:
{
  "summary": "...",
  "items": [
    { "id": <number>, "workstream": "...", "priority": "High|Medium|Low", "deadline": "YYYY-MM-DD or null", "estimated_time": "...", "next_step": "...", "flag": "..." }
  ]
}`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1500, messages: [{ role: "user", content: prompt }] })
      });
      const data = await response.json();

      if (data.error) {
        if (data.error.type === "authentication_error") { localStorage.removeItem("anthropic_api_key"); renderTriageError("Invalid API key — tap Triage again to re-enter it."); }
        else { renderTriageError(data.error.message || "Triage failed — try again."); }
        btn.disabled = false; updateTriageBtn(); return;
      }

      const raw = data.content.map(b => b.text || "").join("");
      const result = JSON.parse(raw.replace(/```json|```/g, "").trim());

      setStatus("Saving…");
      for (const t of result.items) {
        const item = items.find(i => i.id === t.id);
        if (!item) continue;
        item.workstream = t.workstream;
        item.priority = t.priority;
        item.deadline = t.deadline || null;
        item.estimated_time = t.estimated_time;
        await db.from("captures").update({ workstream: t.workstream, priority: t.priority, deadline: t.deadline || null, estimated_time: t.estimated_time }).eq("id", t.id);
      }
      setStatus("");

      triageRun = true;
      document.getElementById("sort-bar").classList.add("visible");
      render();
      renderTriage(result);

    } catch (e) { renderTriageError("Triage failed — try again."); }

    btn.disabled = false;
    updateTriageBtn();
  }

  // ── Sort ───────────────────────────────────────────────────────────────────
  function setSort(type) {
    currentSort = currentSort === type ? null : type;
    document.querySelectorAll(".sort-btn").forEach(b => b.classList.toggle("active", b.dataset.sort === currentSort));
    render();
  }

  function toMins(t) {
    if (!t) return 9999;
    if (TIME_MINS[t] !== undefined) return TIME_MINS[t];
    const m = t.match(/(\d+)\s*(hr|hour|min)/i);
    if (m) return m[2][0] === "h" ? +m[1] * 60 : +m[1];
    return 9999;
  }

  function deadlineMs(iso) {
    if (!iso) return Infinity;
    try { return new Date(iso + "T00:00:00").getTime(); } catch { return Infinity; }
  }

  function sortItems(list) {
    if (!currentSort) return list;
    const s = [...list];
    if (currentSort === "priority") { const o = { High: 0, Medium: 1, Low: 2 }; s.sort((a, b) => (o[a.priority] ?? 3) - (o[b.priority] ?? 3)); }
    else if (currentSort === "time") { s.sort((a, b) => toMins(a.estimated_time) - toMins(b.estimated_time)); }
    else if (currentSort === "deadline") { s.sort((a, b) => deadlineMs(a.deadline) - deadlineMs(b.deadline)); }
    return s;
  }

  // ── Deadline display ───────────────────────────────────────────────────────
  function fmtDeadline(iso) {
    if (!iso) return null;
    try {
      const d = new Date(iso + "T00:00:00");
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const diff = Math.round((d - today) / 86400000);
      if (diff < 0)  return { label: `Overdue · ${d.toLocaleDateString("en-SG", { day: "numeric", month: "short" })}`, overdue: true };
      if (diff === 0) return { label: "Due today", overdue: false };
      if (diff === 1) return { label: "Due tomorrow", overdue: false };
      if (diff <= 7)  return { label: d.toLocaleDateString("en-SG", { weekday: "short", day: "numeric", month: "short" }), overdue: false };
      return { label: d.toLocaleDateString("en-SG", { day: "numeric", month: "short" }), overdue: false };
    } catch { return { label: iso, overdue: false }; }
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function groupByWorkstream(list) {
    const groups = {};
    for (const item of list) {
      const ws = item.workstream || "Uncategorised";
      if (!groups[ws]) groups[ws] = [];
      groups[ws].push(item);
    }
    const keys = Object.keys(groups).filter(k => k !== "Uncategorised").sort();
    if (groups["Uncategorised"]) keys.push("Uncategorised");
    return { groups, keys };
  }

  function render() {
    const list = document.getElementById("list");
    const hasDone = items.some(i => i.done);

    document.getElementById("clear-btn").style.display = items.length ? "block" : "none";
    document.getElementById("toggle-done-btn").style.display = hasDone ? "block" : "none";

    const visible = hideDone ? items.filter(i => !i.done) : items;

    if (visible.length === 0) {
      list.innerHTML = `<div class="empty-state">${items.length === 0 ? "Nothing captured yet" : "All done — nothing to show"}</div>`;
    } else if (currentSort) {
      list.innerHTML = sortItems(visible).map(item => itemHtml(item)).join("");
    } else if (visible.some(i => i.workstream)) {
      const { groups, keys } = groupByWorkstream(visible);
      list.innerHTML = keys.map(ws => `
        <div class="ws-group">
          <div class="ws-header">${escHtml(ws)}</div>
          ${groups[ws].map(item => itemHtml(item)).join("")}
        </div>`).join("");
    } else {
      list.innerHTML = visible.map(item => itemHtml(item)).join("");
    }

    updateTriageBtn();
  }

  function itemHtml(item) {
    const pClass = item.priority ? `p-${item.priority.toLowerCase()}` : "";
    const pColor = P_COLOR[item.priority] || "";
    const dl = item.deadline ? fmtDeadline(item.deadline) : null;

    if (item.id === editingId) {
      return `
        <div class="item ${item.done ? "done" : ""} ${pClass}" id="item-${item.id}">
          <button class="check-btn ${item.done ? "checked" : ""}" onclick="toggleDone(${item.id})">
            ${item.done ? `<svg width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5l2.5 2.5 5-5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>` : ""}
          </button>
          <div class="item-body">
            <input class="item-edit-input" id="edit-input-${item.id}" type="text" value="${escHtml(item.text)}"
              onkeydown="if(event.key==='Enter')saveEdit(${item.id});if(event.key==='Escape')cancelEdit();" autocomplete="off" />
          </div>
          <button class="edit-action-btn edit-save-btn" onclick="saveEdit(${item.id})" title="Save">✓</button>
          <button class="edit-action-btn edit-cancel-btn" onclick="cancelEdit()" title="Cancel">×</button>
        </div>`;
    }

    const meta = [];
    meta.push(`<span class="item-time">${escHtml(item.timestamp)}</span>`);
    if (item.priority) meta.push(`<span class="meta-sep">·</span><span class="item-priority-label" style="color:${pColor}">${item.priority}</span>`);
    if (dl) meta.push(`<span class="meta-sep">·</span><span class="item-deadline-tag${dl.overdue ? " overdue" : ""}">${escHtml(dl.label)}</span>`);
    if (item.estimated_time) meta.push(`<span class="meta-sep">·</span><span class="item-est-tag">${escHtml(item.estimated_time)}</span>`);
    return `
      <div class="item ${item.done ? "done" : ""} ${pClass}" id="item-${item.id}">
        <button class="check-btn ${item.done ? "checked" : ""}" onclick="toggleDone(${item.id})">
          ${item.done ? `<svg width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5l2.5 2.5 5-5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>` : ""}
        </button>
        <div class="item-body">
          <div class="item-text">${escHtml(item.text)}</div>
          <div class="item-meta">${meta.join("")}</div>
        </div>
        <button class="edit-btn" onclick="startEdit(${item.id})" title="Edit">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5l2 2-7 7H1.5v-2l7-7z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="del-btn" onclick="deleteItem(${item.id})">×</button>
      </div>`;
  }

  function updateTriageBtn() {
    const activeCount = items.filter(i => !i.done).length;
    const footer = document.getElementById("triage-footer");
    const btn = document.getElementById("triage-btn");
    if (activeCount > 0) {
      footer.style.display = "block";
      if (!btn.disabled) btn.textContent = `Triage ${activeCount} item${activeCount !== 1 ? "s" : ""}`;
    } else {
      footer.style.display = "none";
    }
  }

  function updateTriageResultVisibility() {
    const el = document.getElementById("triage-result");
    const isDesktop = window.matchMedia("(min-width: 768px)").matches;
    if (!isDesktop) el.style.display = "none";
  }

  // ── Triage result render ───────────────────────────────────────────────────
  function renderTriage(result) {
    const el = document.getElementById("triage-result");

    const deepItems = result.items.filter(i => toMins(i.estimated_time) >= 60 && (i.priority === "High" || i.priority === "Medium"));
    const deepMins = deepItems.reduce((s, i) => s + toMins(i.estimated_time), 0);
    const deepHrs = deepMins >= 60
      ? `${(deepMins / 60).toFixed(1).replace(".0", "")} hr${deepMins / 60 !== 1 ? "s" : ""}`
      : `${deepMins} min`;
    const deepCard = deepItems.length ? `
      <div class="deep-work-card">
        <div class="deep-work-icon">🧠</div>
        <div class="deep-work-text"><strong>${deepHrs} of deep work</strong> needed to clear ${deepItems.length} weighty item${deepItems.length !== 1 ? "s" : ""}. Find a block and protect it.</div>
      </div>` : "";

    const groups = {};
    for (const t of result.items) {
      const ws = t.workstream || "General";
      if (!groups[ws]) groups[ws] = [];
      const src = items.find(i => i.id === t.id);
      groups[ws].push({ ...t, originalText: src ? src.text : "" });
    }
    const wsKeys = Object.keys(groups).filter(k => k !== "General").sort();
    if (groups["General"]) wsKeys.push("General");

    el.innerHTML = `
      <div class="result-summary">
        <div class="result-label">Summary</div>
        <div class="result-summary-text">${escHtml(result.summary)}</div>
      </div>
      ${deepCard}
      ${wsKeys.map(ws => `
        <div class="result-ws-group">
          <div class="result-ws-header">${escHtml(ws)}</div>
          ${groups[ws].map(item => {
            const dl = item.deadline ? fmtDeadline(item.deadline) : null;
            return `
            <div class="result-item" style="border-left: 3px solid ${P_COLOR[item.priority] || "#2D5BE3"}">
              <div class="result-item-header">
                <div class="result-item-text">${escHtml(item.originalText)}</div>
                <span class="priority-badge" style="background:${P_COLOR[item.priority]}18; color:${P_COLOR[item.priority]}">${item.priority}</span>
              </div>
              <div class="result-next">→ ${escHtml(item.next_step)}</div>
              <div class="result-meta-row">
                ${dl ? `<span class="result-deadline">${escHtml(dl.label)}</span>` : ""}
                ${item.estimated_time ? `<span class="result-est-time">${escHtml(item.estimated_time)}</span>` : ""}
              </div>
              ${item.flag ? `<div class="result-flag">⚠ ${escHtml(item.flag)}</div>` : ""}
            </div>`;
          }).join("")}
        </div>`).join("")}`;

    el.style.display = "block";
  }

  function renderTriageError(msg) {
    const el = document.getElementById("triage-result");
    el.innerHTML = `<div class="error-msg">${escHtml(msg || "Triage failed — try again.")}</div>`;
    el.style.display = "block";
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function setStatus(msg) { document.getElementById("status").textContent = msg; }
  function escHtml(str) { return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function escTxt(str) { return String(str || "").replace(/"/g, "'"); }

  init();
</script>
</body>
</html>
